name: Compilar APK con Icono de Gatito
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar compilador Cordova
        run: npm install -g cordova

      - name: Crear contenedor Android limpio
        run: |
          # ¡Podes cambiar "Mi App de Gato" de abajo por el nombre que quieras en tu celular!
          cordova create mi-app com.miapp.limpia "Mi App de Gato"
          cd mi-app
          cordova platform add android

      - name: Inyectar tus archivos HTML
        run: |
          rm -rf mi-app/www/*
          cp index.html mi-app/www/index.html
          cp *.js mi-app/www/ 2>/dev/null || true
          cp *.css mi-app/www/ 2>/dev/null || true

      - name: Descargar e Instalar Icono de Gatito
        run: |
          # Descarga un icono limpio de gatito saludando en formato PNG transparente
          curl -L -o mi-app/www/icon.png "https://r2.dev"
          
          # Añade la configuracion del icono en el archivo config.xml de Cordova
          sed -i '/<\/widget>/i \    <icon src="www/icon.png" \/>' mi-app/config.xml

      - name: Configurar Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Compilar APK final
        run: |
          cd mi-app
          cordova build android --debug

      - name: Guardar APK como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: mi-apk-con-gatito
          path: mi-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
