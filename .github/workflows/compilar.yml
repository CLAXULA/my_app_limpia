name: Compilar VPN Gatito Seguro
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Android WebView Template
        run: |
          # Descarga una plantilla nativa de Android vacía y ultra-limpia para WebViews
          curl -L -o template.zip "https://github.com"
          unzip template.zip
          mv Android-WebView-Template-master/* .

      - name: Inyectar tus archivos HTML
        run: |
          # Reemplaza la web de la plantilla por tu index.html real
          rm -rf app/src/main/assets/*
          cp index.html app/src/main/assets/index.html
          cp *.js app/src/main/assets/ 2>/dev/null || true
          cp *.css app/src/main/assets/ 2>/dev/null || true

      - name: Descargar e Instalar Icono de Gatito
        run: |
          # Descarga el icono del gatito en las carpetas de recursos de Android
          curl -L -o app/src/main/res/mipmap-hdpi/ic_launcher.png "https://r2.dev"
          curl -L -o app/src/main/res/mipmap-mdpi/ic_launcher.png "https://r2.dev"
          curl -L -o app/src/main/res/mipmap-xhdpi/ic_launcher.png "https://r2.dev"
          curl -L -o app/src/main/res/mipmap-xxhdpi/ic_launcher.png "https://r2.dev"

      - name: Aplicar Nombre VPN Kotik en Ruso
        run: |
          # Sobreescribe el nombre de la app directamente en el archivo de recursos con codificacion UTF-8 segura
          mkdir -p app/src/main/res/values
          echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">VPN Котик</string></resources>' > app/src/main/res/values/strings.xml

      - name: Otorgar permisos de ejecucion
        run: chmod +x gradlew

      - name: Compilar APK final con Gradle Oficial
        run: ./gradlew assembleDebug

      - name: Guardar APK como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: vpn-gatito-ruso-apk
          path: app/build/outputs/apk/debug/*.apk
