name: Compilar VPN Gatito Seguro
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar compilador Cordova
        run: npm install -g cordova

      - name: Crear contenedor Android Seguro
        run: |
          # Se crea la estructura usando nombres estrictamente ASCII para evitar el error de Gradle
          cordova create mi-app com.miapp.limpia "VPNGatito"
          cd mi-app
          cordova platform add android

      - name: Inyectar tus archivos HTML
        run: |
          rm -rf mi-app/www/*
          cp index.html mi-app/www/index.html
          cp *.js mi-app/www/ 2>/dev/null || true
          cp *.css mi-app/www/ 2>/dev/null || true

      - name: Descargar e Instalar Icono de Gatito
        run: |
          curl -L -o mi-app/www/icon.png "https://r2.dev"
          sed -i '/<\/widget>/i \    <icon src="www/icon.png" \/>' mi-app/config.xml

      - name: Forzar Nombre Ruso Mediante Localizacion Segura
        run: |
          # Creamos una carpeta de idioma por defecto (valores base de Android) que sobreescribe el string en UTF-8 limpio
          mkdir -p mi-app/platforms/android/app/src/main/res/values
          echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">VPN Котик</string><string name="launcher_name">VPN Котик</string></resources>' > mi-app/platforms/android/app/src/main/res/values/strings.xml

      - name: Configurar Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Compilar APK final
        run: |
          cd mi-app
          cordova build android --debug

      - name: Guardar APK como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: vpn-gatito-ruso-apk
          path: mi-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
